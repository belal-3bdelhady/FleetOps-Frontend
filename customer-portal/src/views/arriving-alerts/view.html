<!-- src/views/arriving-alerts/view.html -->
<div class="view-page aa-view">

  <!-- ── Alert Banner ── -->
  <div class="aa-alert-banner" role="alert" aria-live="assertive">
    <div class="aa-alert-banner__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
    </div>
    <div class="aa-alert-banner__body">
      <strong>🚚 Your driver is almost here!</strong>
      <span>Arriving in 2–5 minutes &bull; Be ready at the door</span>
    </div>
  </div>

  <!-- ── Map Card ── -->
  <div class="aa-map-card" role="region" aria-label="Live driver location map">
    <button class="aa-map-recenter" aria-label="Re-center map" title="Re-center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="22" y1="12" x2="18" y2="12" />
        <line x1="6" y1="12" x2="2" y2="12" />
        <line x1="12" y1="6" x2="12" y2="2" />
        <line x1="12" y1="22" x2="12" y2="18" />
      </svg>
    </button>
    <!-- Leaflet renders here — JS in view.js initialises it after load -->
    <div id="aa-tracking-map" style="width:100%;height:100%;border-radius:inherit;"></div>
    <div class="aa-distance-badge">
      <span class="aa-distance-dot"></span>
      500M AWAY
    </div>
  </div>

  <!-- ── Payment Card ── -->
  <div class="card aa-payment-card">
    <div class="aa-payment-card__top">
      <div class="aa-payment-card__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
      </div>
      <span class="badge badge--in_transit">PREPARE CASH</span>
    </div>
    <span class="section-label">TOTAL AMOUNT DUE</span>
    <strong class="aa-payment-amount">EGP 450</strong>
  </div>

  <!-- ── Instructions Card ── -->
  <div class="card aa-instructions-card">
    <div class="aa-instructions-card__header">
      <div class="aa-instructions-card__icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
      </div>
      <strong>Instructions</strong>
    </div>
    <p class="aa-instructions-text">"Leave at front desk and notify security personnel upon arrival."</p>
    <a href="/delivery-preferences" data-link class="aa-instructions-edit">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
      </svg>
      Edit preferences
    </a>
  </div>

  <!-- ── Driver Card ── -->
  <div class="card aa-driver-card">
    <div class="aa-driver-info">
      <div class="aa-driver-avatar" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <div class="aa-driver-details">
        <strong>Ahmed K.</strong>
        <span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="var(--status-warning)" stroke="var(--status-warning)"
            stroke-width="0">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          4.9 &bull; White Toyota Hiace
        </span>
      </div>
    </div>
    <div class="aa-driver-actions">
      <button class="aa-action-btn" id="aa-msg-btn" aria-label="Message driver">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </button>
      <a href="tel:+" class="aa-action-btn" aria-label="Call driver">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.6a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 3h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 10.6a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
      </a>
    </div>
  </div>

  <!-- ── Ready CTA ── -->
  <button class="btn btn--primary aa-ready-btn" id="aa-ready-btn">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
      <polyline points="22 4 12 14.01 9 11.01" />
    </svg>
    I'm ready
  </button>

</div>
