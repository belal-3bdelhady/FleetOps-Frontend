<section class="view-page vehicle-details-page stack">
  <main>
    <div class="details-header">
      <a href="/vehicles" class="btn-back" data-link>&larr; Back to Vehicles</a>
      <h1 id="vehicle-title" class="vehicle-title">Vehicle Details</h1>
    </div>

    <div id="vehicle-details-content" class="details-grid">
      <div class="details-card">
        <h3>Vehicle Information</h3>
        <div class="info-row">
          <span>License Plate:</span> <span id="info-plate"></span>
        </div>
        <div class="info-row">
          <span>Type:</span> <span id="info-type"></span>
        </div>
        e Plate: Type: Make & Model: Status:
        <div class="info-row">
          <span>Make & Model:</span> <span id="info-make"></span>
        </div>
        <div class="info-row">
          <span>Status:</span> <span id="info-status"></span>
        </div>
      </div>

      <div class="details-card">
        <h3>Operational Data</h3>
        <div class="info-row">
          <span>Odometer:</span> <span id="info-odometer"></span>
        </div>
        <div class="info-row">
          <span>Market Value:</span> <span id="info-value"></span>
        </div>
        <div class="info-row">
          <span>CTV:</span> <span id="info-ctv"></span>
        </div>
      </div>

      <div class="details-card">
        <h3>Maintenance History</h3>
        <div class="info-row">
          <span>Last Service:</span> <span id="info-last-service"></span>
        </div>
        <div class="info-row">
          <span>Next Service:</span> <span id="info-next-service"></span>
        </div>
        <div class="info-row">
          <span>Insurance Expiry:</span> <span id="info-insurance"></span>
        </div>
      </div>

      <div class="details-card full-width">
        <h3>Additional Details</h3>
        <p id="info-details"></p>
      </div>
    </div>
  </main>
</section>
