<section class="view-page vehicles-page stack">
  <main>
    <div class="vehicle-page">
      <div class="vehicle-page-header">
        <h1 class="vehicle-page-title">Vehicles</h1>
        <span class="vehicle-page-subtitle"
          ><span class="fleet-info">1</span>Vehicles in fleet</span
        >
      </div>
      <div class="vehicle-page-content">
        <div class="vehicle-page-filters">
          <div class="vehicle-page-filter">
            <input
              type="text"
              id="vehicle-page-filter-search"
              class="vehicle-page-filter-input"
              placeholder="Search by name or license plate..."
            />
            <select class="vehicle-page-filter-dropdown">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="maintenance">Maintenance</option>
              <option value="inactive">Inactive</option>
            </select>
            <select class="vehicle-page-filter-dropdown">
              <option value="">All Types</option>
              <option value="truck">Truck</option>
              <option value="van">Van</option>
              <option value="car">Car</option>
            </select>
          </div>
        </div>
      </div>
      <div class="vehicle-page-table">
        <div class="vehicle-page-table-body">
          <table>
            <thead>
              <tr>
                <th>License Plate</th>
                <th>Type</th>
                <th>Make & Model</th>
                <th>Status</th>
                <th>Odometer</th>
                <th>Last Service</th>
                <th>Next Service</th>
                <th>Insurance Expiry</th>
                <th>Market Value</th>
                <th>CTV</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <!-- todo: populate this table -->
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</section>
