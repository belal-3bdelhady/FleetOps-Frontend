<div class="dashboard-wrapper">
<link rel="stylesheet" href="./src/views/dashboard/view.css">
  <!-- ── Top Header Bar ───────────────────────────────────────────── -->

  <!-- ── KPI Cards ─────────────────────────────────────────────────── -->
  <section class="kpi-grid" id="kpi-grid">
    <!-- Rendered by view.js -->
  </section>

  <!-- ── Alerts Banner ─────────────────────────────────────────────── -->
  <section class="alerts-section" id="alerts-section">
    <!-- Rendered by view.js -->
  </section>

  <!-- ── Bottom Grid ───────────────────────────────────────────────── -->
  <div class="dashboard-bottom-grid">

    <!-- Recent Work Orders -->
    <section class="panel recent-work-orders">
      <div class="panel-header">
        <h2 class="panel-title">Recent Work Orders</h2>
        <a href="/work-orders" class="panel-view-all">View All →</a>
      </div>
      <div class="table-wrapper">
        <table class="wo-table" id="wo-table">
          <thead>
            <tr>
              <th>WO ID</th>
              <th>Vehicle</th>
              <th>Type</th>
              <th>Mechanic</th>
              <th>Status</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="wo-tbody">
            <!-- Rendered by view.js -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Right-side panels -->
    <aside class="right-panels">

      <!-- Vehicles Needing Attention -->
      <section class="panel vehicles-attention">
        <div class="panel-header">
          <h2 class="panel-title">Vehicles Needing Attention</h2>
          <span class="panel-count" id="vehicles-count">5</span>
        </div>
        <ul class="vehicle-list" id="vehicles-attention-list">
          <!-- Rendered by view.js -->
        </ul>
      </section>
    </aside>
  </div>

</div>
