<section class="view-page audit-container">
    <div class="audit-header">
        <div class="audit-header__title">
            <h2 class="heading-lg">System Audit Trail</h2>
            <p class="helper-text">Immutable, read-only log of all system changes and activities.</p>
        </div>
        <button id="export-csv-btn" class="button primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Export CSV
        </button>
    </div>

    <div class="card audit-filters">
        <div class="search-field audit-filter-search">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="filter-search" placeholder="Search by details or Log ID..." />
        </div>
        <div class="audit-filter-group">
            <label class="label" for="filter-date-from">From</label>
            <input type="date" id="filter-date-from" class="filter-input" />
        </div>
        <div class="audit-filter-group">
            <label class="label" for="filter-date-to">To</label>
            <input type="date" id="filter-date-to" class="filter-input" />
        </div>
        <div class="audit-filter-group">
            <label class="label" for="filter-user">User</label>
            <select id="filter-user" class="filter-input">
                <option value="">All Users</option>
                <option value="ADM-001">ADM-001</option>
                <option value="MGR-099">MGR-099</option>
                <option value="DSP-104">DSP-104</option>
                <option value="MEC-002">MEC-002</option>
            </select>
        </div>
        <div class="audit-filter-group">
            <label class="label" for="filter-entity">Entity</label>
            <select id="filter-entity" class="filter-input">
                <option value="">All Entities</option>
                <option value="UserRole">UserRole</option>
                <option value="Vehicle">Vehicle</option>
                <option value="Route">Route</option>
                <option value="SystemPolicy">SystemPolicy</option>
                <option value="MaintenanceTask">MaintenanceTask</option>
                <option value="Order">Order</option>
            </select>
        </div>
        <div class="audit-filter-group">
            <label class="label" for="filter-action">Action</label>
            <select id="filter-action" class="filter-input">
                <option value="">All Actions</option>
                <option value="Created">Created</option>
                <option value="Updated">Updated</option>
                <option value="Deleted">Deleted</option>
            </select>
        </div>
    </div>

    <div class="card audit-table-wrapper">
        <table class="audit-table">
            <thead>
                <tr>
                    <th>Log ID</th>
                    <th>Date / Time</th>
                    <th>User</th>
                    <th>Entity</th>
                    <th>Action</th>
                    <th>Details & Changes</th>
                </tr>
            </thead>
            <tbody id="audit-table-body">
                <!-- Rows injected dynamically -->
            </tbody>
        </table>
        <div id="audit-empty-state" class="empty-state" style="display: none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-placeholder); margin-bottom: 12px;">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <p style="font-weight: 500; font-size: 16px; color: var(--color-text-title);">No audit logs found</p>
            <p class="helper-text">Try adjusting your filters to find what you're looking for.</p>
        </div>
    </div>
</section>
