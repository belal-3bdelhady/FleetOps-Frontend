<section class="maintenance-page">

    <!-- Page Header -->
    <header class="maint-header">
        <h1 class="maint-title">Maintenance Overview</h1>
        <p class="maint-subtitle">Read-only view of the maintenance pipeline</p>
    </header>

    <!-- Vehicle Health Summary -->
    <section class="maint-section">
        <h2 class="maint-section-title">Vehicle Health Summary</h2>
        <div id="vehicle-grid" class="vehicle-grid">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Bottom Two-Column Layout -->
    <div class="maint-bottom-grid">

        <!-- Active Work Orders (left) -->
        <section class="maint-panel">
            <h2 class="maint-panel-title">Active Work Orders</h2>
            <div class="maint-table-wrap">
                <table class="maint-table">
                    <thead>
                        <tr>
                            <th>WO ID</th>
                            <th>Vehicle</th>
                            <th>Issue</th>
                            <th>Mechanic</th>
                            <th>Status</th>
                            <th>Opened</th>
                        </tr>
                    </thead>
                    <tbody id="work-orders-tbody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Right Sidebar -->
        <aside class="maint-sidebar">

            <!-- Upcoming Maintenance Alerts -->
            <section class="maint-panel">
                <h2 class="maint-panel-title">Upcoming Maintenance Alerts</h2>
                <div id="alerts-list" class="maint-alerts-list">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Low Stock Warnings -->
            <section class="maint-panel">
                <div class="maint-panel-title-row">
                    <h2 class="maint-panel-title">Low Stock Warnings</h2>
                    <span class="stock-badge" id="stock-count-badge">4 items</span>
                </div>
                <div id="stock-list" class="maint-stock-list">
                    <!-- Populated by JS -->
                </div>
            </section>

        </aside>
    </div>

</section>
